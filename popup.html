<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    /* ── CSS 변수 (라이트 / 다크) ─────────────── */
    :root {
      --bg: #f8faff;
      --surface: #ffffff;
      --surface-opaque: #ffffff;
      --border: rgba(37, 99, 235, 0.08);
      --text: #1e293b;
      --text-sub: #475569;
      --text-mute: #94a3b8;
      --accent: #1e40af;
      --accent-bg: #eff6ff;
      --accent-txt: #1e3a8a;
      --cat-bg: #ffffff;
      --cat-border: #e2e8f0;
      --input-bg: #ffffff;
      --shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
      --daily-from: #1e40af;
      --daily-to: #2563eb;
      --accent-gold: #f59e0b;
    }

    body.dark {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-opaque: #1e293b;
      --border: rgba(255, 255, 255, 0.05);
      --text: #f1f5f9;
      --text-sub: #cbd5e1;
      --text-mute: #64748b;
      --accent: #1e40af;
      --accent-bg: rgba(30, 64, 175, 0.1);
      --accent-txt: #7dd3fc;
      --cat-bg: #1e293b;
      --cat-border: #334155;
      --input-bg: #0f172a;
      --shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.3);
      --daily-from: #1e40af;
      --daily-to: #2563eb;
      --accent-gold: #fbbf24;
    }

    * {
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
    }

    /* 전체 페이지 스크롤바 제거 */
    html,
    body {
      scrollbar-width: none;
    }

    html::-webkit-scrollbar,
    body::-webkit-scrollbar {
      width: 0;
      display: none;
    }

    html {
      background: transparent;
      border-radius: 28px;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', 'Pretendard', sans-serif;
      width: 420px;
      padding: 24px;
      background: var(--bg);
      margin: 0;
      color: var(--text);
      transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      border-radius: 28px;
      overflow: visible;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-height: auto;
      height: auto;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }



    h2 {
      font-size: 16px;
      font-weight: 900;
      background: linear-gradient(to right, var(--accent), #f59e0b);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
      letter-spacing: -1px;
      white-space: nowrap;
    }

    .header-controls {
      display: flex;
      gap: 5px;
    }

    .os-toggle {
      display: flex;
      background: var(--cat-bg);
      padding: 3px;
      border-radius: 14px;
      border: 1px solid var(--cat-border);
      backdrop-filter: blur(5px);
    }

    .os-toggle button, .lang-toggle button {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5px 9px;
      cursor: pointer;
      color: var(--text-mute);
      font-size: 11px;
      font-weight: 700;
      border-radius: 10px;
      border: none;
      transition: all 0.3s ease;
      line-height: 1;
    }

    .os-toggle button.active, .lang-toggle button.active {
      background: var(--accent);
      color: #fff;
    }

    .header-icon-btn {
      background: var(--cat-bg);
      border: 1px solid var(--cat-border);
      width: 36px;
      height: 36px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 17px;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      backdrop-filter: blur(5px);
    }

    .header-icon-btn:hover {
      transform: scale(1.1);
    }

    .theme-chooser {
      display: flex;
      gap: 10px;
      background: var(--surface);
      padding: 12px;
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      position: absolute;
      top: 70px;
      right: 24px;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .theme-swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: all 0.2s ease;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .theme-swatch:hover {
      transform: scale(1.15);
    }

    .theme-swatch.active {
      border-color: var(--text);
      transform: scale(1.1);
    }

    #daily-card {
      background: linear-gradient(135deg, var(--daily-from), var(--daily-to));
      color: white;
      padding: 20px;
      border-radius: 28px;
      box-shadow: 0 15px 30px -5px rgba(30, 64, 175, 0.4);
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
      transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    #daily-card::after {
      content: "";
      position: absolute;
      top: -40%;
      right: -10%;
      width: 180px;
      height: 180px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 50%;
    }

    #daily-card .label {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
      opacity: 0.8;
    }

    #daily-content {
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    #daily-title {
      font-size: 17px;
      font-weight: 800;
      margin-bottom: 10px;
      line-height: 1.4;
      transition: all 0.3s ease;
    }



    .fade-out {
      opacity: 0;
      transform: translateX(-10px);
    }

    .fade-in {
      opacity: 1;
      transform: translateX(0);
    }

    #daily-shortcut {
      font-size: 12px;
      background: rgba(255, 255, 255, 0.25);
      padding: 5px 14px;
      border-radius: 10px;
      font-weight: 800;
      display: inline-block;
      backdrop-filter: blur(10px);
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 20px;
      border: 1px solid var(--border);
      border-radius: 22px;
      outline: none;
      font-size: 14px;
      background: var(--input-bg);
      color: var(--text);
      transition: all 0.33s ease;
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 5px var(--accent-bg);
      background: var(--surface-opaque);
    }

    .nav {
      display: flex;
      gap: 12px;
      margin: 24px 0 16px;
    }

    .nav button {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 800;
      color: var(--text-sub);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      background: var(--cat-bg);
      border: 1px solid var(--cat-border);
      backdrop-filter: blur(10px);
      line-height: 1;
    }

    #stats-btn {
      flex: 0 0 auto;
      font-size: 20px;
      padding: 12px;
      min-width: unset;
    }

    .nav button.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2);
    }

    #cat-nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    #cat-nav button {
      cursor: pointer;
      padding: 7px 16px;
      border-radius: 16px;
      background: var(--cat-bg);
      border: 1px solid var(--cat-border);
      font-size: 12px;
      font-weight: 700;
      color: var(--text-sub);
      transition: all 0.3s ease, opacity 0.1s ease;
      backdrop-filter: blur(5px);
    }

    #cat-nav button.dragging {
      opacity: 0.4;
      cursor: grabbing;
    }

    #cat-nav button.drag-over {
      transform: scale(1.1);
      border-color: var(--accent-gold);
    }

    #cat-nav button.active {
      background: var(--accent-bg);
      border-color: var(--accent);
      color: var(--accent-txt);
      box-shadow: 0 4px 10px rgba(37, 99, 235, 0.1);
    }

    #list {
      height: auto;
      overflow: visible;
      padding: 5px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .tip-item {
      background: var(--surface);
      padding: 20px;
      border-radius: 26px;
      border: 1px solid var(--border);
      position: relative;
      transition: all 0.3s ease;
      box-shadow: var(--shadow);
      cursor: pointer;
    }

    .tip-item:hover {
      background: var(--surface-opaque);
    }

    .tip-item:hover,
    #daily-card:hover {
      transform: translateY(-6px) scale(1.02);
      border-color: var(--accent);
      box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.1);
    }

    .tip-item.highlight {
      animation: highlight-pulse 0.6s ease-out;
    }

    @keyframes highlight-pulse {
      0% {
        box-shadow: 0 0 30px rgba(245, 158, 11, 0.8), var(--shadow);
      }
      100% {
        box-shadow: var(--shadow);
      }
    }

    #daily-card:hover {
      transform: translateY(-8px) scale(1.03);
      filter: brightness(1.05);
      box-shadow: 0 25px 50px -12px rgba(37, 99, 235, 0.4);
    }



    .tip-item.actionable {
      cursor: pointer;
    }

    .tip-category {
      font-size: 10px;
      color: var(--accent);
      font-weight: 900;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
    }

    .tip-title {
      font-weight: 900;
      font-size: 16px;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .tip-desc {
      font-size: 12px;
      color: var(--text-sub);
      line-height: 1.6;
    }

    .shortcut {
      display: inline-flex;
      background: var(--accent-bg);
      color: var(--accent-txt);
      padding: 5px 14px;
      border-radius: 12px;
      font-size: 11px;
      margin-top: 12px;
      font-weight: 800;
      border: 1px solid var(--border);
    }
    
    .tip-item:hover .tip-category {
      color: var(--accent-gold);
    }
    
    .fav-btn {
      position: absolute;
      right: 18px;
      top: 18px;
      cursor: pointer;
      font-size: 22px;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .note-btn {
      position: absolute;
      right: 50px;
      top: 18px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      transition: transform 0.2s;
      padding: 0;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .note-btn:hover {
      transform: scale(1.2);
    }

    .go-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--accent);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 16px;
      margin-top: 14px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(30, 64, 175, 0.2);
    }

    .go-btn:hover {
      background: #1e3a8a;
      transform: translateY(-2px);
    }

    .empty-msg {
      text-align: center;
      color: var(--text-mute);
      padding: 60px 20px;
      font-size: 15px;
      font-weight: 600;
    }

    #list::-webkit-scrollbar {
      width: 4px;
    }

    #list::-webkit-scrollbar-track {
      background: transparent;
    }

    #list::-webkit-scrollbar-thumb {
      background: var(--text-mute);
      border-radius: 10px;
    }

    /* ── PC 전용 효과 ────────────────────────── */
    @keyframes barrel-roll {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .effect-barrel-roll {
      animation: barrel-roll 0.8s cubic-bezier(0.45, 0.05, 0.55, 0.95);
    }

    .effect-askew {
      transform: rotate(3deg) !important;
      transition: transform 0.3s ease;
    }

    /* ── 심화 효과 전용 ──────────────────────── */
    #effect-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
    }


    .search-wrapper {
      position: relative;
      margin-bottom: 0;
    }

    #clear-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      font-size: 14px;
      color: var(--text-sub);
      cursor: pointer;
      opacity: 0.5;
      transition: opacity 0.2s;
      padding: 5px;
      line-height: 1;
    }

    #clear-btn:hover {
      opacity: 1;
    }

    /* ── 모달 스타일 ──────────────────────────── */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      backdrop-filter: blur(4px);
    }

    .modal-content {
      background: var(--surface);
      border-radius: 16px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 1;
    }

    .modal-header h3 {
      margin: 0;
      color: var(--text);
      font-size: 16px;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: var(--text-mute);
      padding: 0;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      transition: all 0.2s;
    }

    .modal-close:hover {
      background: var(--accent-bg);
      color: var(--accent);
    }

    /* 통계 리스트 */
    .stats-list {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .stats-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      background: var(--accent-bg);
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .stats-item.empty {
      text-align: center;
      color: var(--text-mute);
      padding: 40px 20px;
    }

    .stats-rank {
      font-weight: 800;
      color: var(--accent);
      font-size: 16px;
      min-width: 30px;
    }

    .stats-info {
      flex: 1;
      margin-left: 12px;
    }

    .stats-title {
      font-weight: 700;
      color: var(--text);
      font-size: 14px;
    }

    .stats-category {
      font-size: 11px;
      color: var(--text-mute);
      margin-top: 2px;
    }

    .stats-views {
      font-weight: 800;
      color: var(--accent-gold);
      font-size: 14px;
      text-align: right;
    }

    /* 메모 폼 */
    #note-form {
      padding: 20px;
    }

    #note-input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      color: var(--text);
      background: var(--input-bg);
      resize: vertical;
      min-height: 100px;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }

    #note-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-bg);
    }

    .note-buttons {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      justify-content: flex-end;
    }

    .btn-save, .btn-delete {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-save {
      background: var(--accent);
      color: white;
    }

    .btn-save:hover {
      box-shadow: 0 4px 12px rgba(30, 64, 175, 0.3);
    }

    .btn-delete {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
    }

    .btn-delete:hover {
      background: rgba(239, 68, 68, 0.2);
    }

    /* 메모 리스트 */
    .note-list {
      padding: 20px;
      border-top: 1px solid var(--border);
    }

    .note-item {
      padding: 12px 14px;
      background: var(--bg);
      border-radius: 10px;
      margin-bottom: 10px;
      border-left: 3px solid var(--accent-gold);
    }

    .note-date {
      font-size: 11px;
      color: var(--text-mute);
      margin-bottom: 6px;
    }

    .note-content {
      font-size: 13px;
      color: var(--text);
      line-height: 1.5;
    }

    .note-empty {
      text-align: center;
      color: var(--text-mute);
      font-size: 13px;
      padding: 20px;
    }

    /* ── 관련 팁 섹션 ──────────────────────────── */
    .related-tips {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .related-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent-gold);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .related-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .related-item {
      display: inline-flex;
      align-items: center;
      background: rgba(245, 158, 11, 0.08);
      color: var(--accent-gold);
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid rgba(245, 158, 11, 0.2);
      transition: all 0.2s;
      line-height: 1;
    }

    .related-item:hover {
      background: rgba(245, 158, 11, 0.15);
      border-color: rgba(245, 158, 11, 0.4);
      transform: translateX(4px);
    }
  </style>
  <style>
    /* ── 복사 가능한 단축키 스타일 ────────────────── */
    .shortcut.copyable {
      cursor: copy;
      border: 1px dashed var(--accent-txt);
      transition: all 0.2s ease;
    }
    .shortcut.copyable:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      transform: scale(1.05);
    }
  </style>
  <style>
    /* ── 토스트 알림 스타일 ────────────────── */
    .toast {
      position: fixed;
      bottom: -100px;
      /* Start off-screen */
      left: 50%;
      transform: translateX(-50%);
      background-color: #2c3e50;
      color: #fff;
      padding: 12px 24px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      z-index: 10001;
      transition: bottom 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    .toast.show {
      bottom: 30px;
      /* Slide in */
    }
  </style>
</head>

<body>
  <!-- 헤더 -->
  <div class="header">
    <h2>📖 My Chrome Handbook</h2>
    <div class="header-controls">
      <div class="os-toggle">
        <button type="button" id="os-win">Win</button>
        <button type="button" id="os-mac">Mac</button>
      </div>
      <div class="lang-toggle os-toggle">
        <button type="button" id="lang-ko">한</button>
        <button type="button" id="lang-en">Eng</button>
      </div>
      <button id="dark-btn" class="header-icon-btn" title="다크모드 전환" style="transition-property: transform;">🌙</button>
    </div>
  </div>

  <div id="daily-card">
    <div id="daily-label" class="label">⭐ 오늘의 추천</div>
    <div id="daily-content">
      <div id="daily-title">로딩 중...</div>
      <div id="daily-shortcut"></div>
    </div>
  </div>

  <!-- 검색 -->
  <div class="search-wrapper">
    <input type="text" id="search" placeholder="검색 (예: 새탭, 단축키, 개발자)">
    <button id="clear-btn">✕</button>
  </div>

  <!-- 전체 / 보관함 / 지름길 탭 -->
  <div class="nav">
    <button type="button" id="tab-all" class="active">전체 팁</button>
    <button type="button" id="tab-fav">내 보관함 ⭐</button>
    <button type="button" id="tab-shortcuts" style="display: none;">나의 지름길 🚀</button>
    <button type="button" id="stats-btn" title="자주 본 팁 통계">📊</button>
  </div>

  <!-- 카테고리 필터 (JS로 생성) -->
  <div id="cat-nav"></div>

  <!-- 추가 버튼 (지름길 탭에서만 보임) -->
  <div id="shortcut-controls" style="display: none; margin-bottom: 16px;">
    <button id="add-shortcut-btn" class="go-btn" style="margin-top: 0; background: var(--accent-gold);">+ 새 지름길 만들기</button>
  </div>

  <!-- 꿀팁 목록 -->
  <div id="list"></div>

  <!-- 토스트 알림 (JS로 제어) -->
  <div id="toast-notification" class="toast"></div>

  <canvas id="effect-canvas"></canvas>

  <!-- 통계 모달 -->
  <div id="stats-modal" class="modal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3>📊 자주 본 팁 Top 10</h3>
        <button class="modal-close stats-close">✕</button>
      </div>
      <div id="stats-list" class="stats-list"></div>
    </div>
  </div>

  <!-- 지름길 모달 -->
  <div id="shortcut-modal" class="modal" style="display: none;">
    <div class="modal-content" style="width: 95%; max-width: 380px;">
      <div class="modal-header">
        <h3 id="shortcut-modal-title">🚀 자동 지름길 설계하기</h3>
        <button class="modal-close shortcut-close">✕</button>
      </div>
      
      <!-- 안내 섹션 -->
      <div style="background: var(--accent-bg); padding: 12px 16px; margin: 10px 20px 0; border-radius: 12px; border: 1px dashed var(--accent);">
        <p style="margin: 0; font-size: 11px; color: var(--accent-txt); line-height: 1.5;">
          <strong>💡 지름길이란?</strong><br>
          단순 접속을 넘어, 복잡한 메뉴 클릭을 자동으로 수행하는 '자율주행 북마크'입니다.
        </p>
      </div>

      <div style="padding: 20px; display: flex; flex-direction: column; gap: 20px;">
        <!-- 1. 이름 -->
        <div>
          <label style="font-size: 13px; font-weight: 800; margin-bottom: 6px; display: flex; align-items: center; gap: 5px;">
            <span>🏷️</span> 지름길 이름
          </label>
          <input type="text" id="sc-name" placeholder="예: 인천대 학사행정, 네이버 수신확인">
          <small style="color: var(--text-mute); font-size: 11px; margin-top: 4px; display: block;">목록에 표시될 이름입니다.</small>
        </div>

        <!-- 2. 시작 주소 -->
        <div>
          <label style="font-size: 13px; font-weight: 800; margin-bottom: 6px; display: flex; align-items: center; gap: 5px;">
            <span>🌐</span> 시작 URL
          </label>
          <input type="text" id="sc-url" placeholder="https://...">
          <small style="color: var(--text-mute); font-size: 11px; margin-top: 4px; display: block;">여정이 시작될 홈페이지 주소를 입력하세요.</small>
        </div>

        <!-- 3. 여정 설계 (자동 클릭 단계) -->
        <div style="background: var(--bg); padding: 16px; border-radius: 16px; border: 1px solid var(--border);">
          <label style="font-size: 13px; font-weight: 800; margin-bottom: 10px; display: flex; align-items: center; gap: 5px;">
            <span>🤖</span> 클릭 여정 설계
          </label>
          
          <div id="sc-steps-container" style="display: flex; flex-direction: column; gap: 8px;">
            <!-- 단계들이 여기에 동적으로 추가됩니다 -->
          </div>

          <button id="add-step-item-btn" style="width: 100%; padding: 8px; margin-top: 10px; background: none; border: 1px dashed var(--text-mute); border-radius: 10px; color: var(--text-sub); font-size: 11px; cursor: pointer; font-weight: 700;">
            + 클릭할 버튼 추가 (다음 단계)
          </button>

          <div style="margin-top: 12px; padding: 10px; background: #fffbe6; border-radius: 8px; border: 1px solid #ffe58f;">
            <p style="margin: 0; font-size: 10.5px; color: #856404; line-height: 1.4;">
              <strong>📝 작성 팁:</strong><br>
              페이지에 보이는 <strong>'글자'</strong>를 정확히 적어주세요. (예: 로그인, 보낸메일함)<br>
              로그인이 필요한 경우 첫 단계를 '로그인'으로 설정하면 편리합니다.
            </p>
          </div>
        </div>

        <div class="note-buttons" style="margin-top: 10px;">
          <button id="save-shortcut-btn" class="btn-save" style="width: 100%; padding: 14px; font-size: 14px;">지름길 저장 및 여정 완성</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 메모 모달 -->
  <div id="note-modal" class="modal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="note-title">메모</h3>
        <button class="modal-close note-close">✕</button>
      </div>
      <div id="note-form">
        <textarea id="note-input" placeholder="이 팁에 대한 메모나 의견을 입력하세요..."></textarea>
        <div class="note-buttons">
          <button onclick="deleteNote()" class="btn-delete"></button>
          <button onclick="saveNote()" class="btn-save"></button>
        </div>
      </div>
      <div id="note-list" class="note-list"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
