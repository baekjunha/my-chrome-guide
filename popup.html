<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <!-- 헤더 -->
  <div class="header">
    <h2>📖 My Chrome Handbook</h2>
    <div class="header-controls">
      <div class="os-toggle">
        <button type="button" id="os-win">Win</button>
        <button type="button" id="os-mac">Mac</button>
      </div>
      <div class="lang-toggle os-toggle">
        <button type="button" id="lang-ko">한</button>
        <button type="button" id="lang-en">Eng</button>
      </div>
      <button id="dark-btn" class="header-icon-btn" title="다크모드 전환" style="transition-property: transform;">🌙</button>
    </div>
  </div>

  <div id="daily-card">
    <div id="daily-label" class="label">⭐ 오늘의 추천</div>
    <div id="daily-content">
      <div id="daily-title">로딩 중...</div>
      <div id="daily-shortcut"></div>
    </div>
  </div>

  <!-- 검색 -->
  <div class="search-wrapper">
    <input type="text" id="search" placeholder="검색 (예: 새탭, 단축키, 개발자)">
    <button id="clear-btn">✕</button>
  </div>

  <!-- 전체 / 보관함 / 지름길 탭 -->
  <div class="nav">
    <button type="button" id="tab-all" class="active">전체 팁</button>
    <button type="button" id="tab-fav">내 보관함 ⭐</button>
    <button type="button" id="tab-shortcuts" style="display: none;">나의 지름길 🚀</button>
    <button type="button" id="stats-btn" title="자주 본 팁 통계">📊</button>
  </div>

  <!-- 카테고리 필터 (JS로 생성) -->
  <div id="cat-nav"></div>

  <!-- 추가 버튼 (지름길 탭에서만 보임) -->
  <div id="shortcut-controls" style="display: none; margin-bottom: 16px;">
    <button id="add-shortcut-btn" class="go-btn" style="margin-top: 0; background: var(--accent-gold);">+ 새 지름길 만들기</button>
  </div>

  <!-- 꿀팁 목록 -->
  <div id="list"></div>

  <!-- 토스트 알림 (JS로 제어) -->
  <div id="toast-notification" class="toast"></div>

  <canvas id="effect-canvas"></canvas>

  <!-- 통계 모달 -->
  <div id="stats-modal" class="modal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3>📊 자주 본 팁 Top 10</h3>
        <button class="modal-close stats-close">✕</button>
      </div>
      <div id="stats-list" class="stats-list"></div>
    </div>
  </div>

  <!-- 지름길 모달 -->
  <div id="shortcut-modal" class="modal" style="display: none;">
    <div class="modal-content" style="width: 95%; max-width: 380px;">
      <div class="modal-header">
        <h3 id="shortcut-modal-title">🚀 자동 지름길 설계하기</h3>
        <button class="modal-close shortcut-close">✕</button>
      </div>
      
      <!-- 안내 섹션 -->
      <div style="background: var(--accent-bg); padding: 12px 16px; margin: 10px 20px 0; border-radius: 12px; border: 1px dashed var(--accent);">
        <p style="margin: 0; font-size: 11px; color: var(--accent-txt); line-height: 1.5;">
          <strong>💡 지름길이란?</strong><br>
          단순 접속을 넘어, 복잡한 메뉴 클릭을 자동으로 수행하는 '자율주행 북마크'입니다.
        </p>
      </div>

      <div style="padding: 20px; display: flex; flex-direction: column; gap: 20px;">
        <!-- 1. 이름 -->
        <div>
          <label style="font-size: 13px; font-weight: 800; margin-bottom: 6px; display: flex; align-items: center; gap: 5px;">
            <span>🏷️</span> 지름길 이름
          </label>
          <input type="text" id="sc-name" placeholder="예: 인천대 학사행정, 네이버 수신확인">
          <small style="color: var(--text-mute); font-size: 11px; margin-top: 4px; display: block;">목록에 표시될 이름입니다.</small>
        </div>

        <!-- 2. 시작 주소 -->
        <div>
          <label style="font-size: 13px; font-weight: 800; margin-bottom: 6px; display: flex; align-items: center; gap: 5px;">
            <span>🌐</span> 시작 URL
          </label>
          <input type="text" id="sc-url" placeholder="https://...">
          <small style="color: var(--text-mute); font-size: 11px; margin-top: 4px; display: block;">여정이 시작될 홈페이지 주소를 입력하세요.</small>
        </div>

        <!-- 3. 여정 설계 (자동 클릭 단계) -->
        <div style="background: var(--bg); padding: 16px; border-radius: 16px; border: 1px solid var(--border);">
          <label style="font-size: 13px; font-weight: 800; margin-bottom: 10px; display: flex; align-items: center; gap: 5px;">
            <span>🤖</span> 클릭 여정 설계
          </label>
          
          <div id="sc-steps-container" style="display: flex; flex-direction: column; gap: 8px;">
            <!-- 단계들이 여기에 동적으로 추가됩니다 -->
          </div>

          <button id="add-step-item-btn" style="width: 100%; padding: 8px; margin-top: 10px; background: none; border: 1px dashed var(--text-mute); border-radius: 10px; color: var(--text-sub); font-size: 11px; cursor: pointer; font-weight: 700;">
            + 클릭할 버튼 추가 (다음 단계)
          </button>

          <div style="margin-top: 12px; padding: 10px; background: #fffbe6; border-radius: 8px; border: 1px solid #ffe58f;">
            <p style="margin: 0; font-size: 10.5px; color: #856404; line-height: 1.4;">
              <strong>📝 작성 팁:</strong><br>
              페이지에 보이는 <strong>'글자'</strong>를 정확히 적어주세요. (예: 로그인, 보낸메일함)<br>
              로그인이 필요한 경우 첫 단계를 '로그인'으로 설정하면 편리합니다.
            </p>
          </div>
        </div>

        <div class="note-buttons" style="margin-top: 10px;">
          <button id="save-shortcut-btn" class="btn-save" style="width: 100%; padding: 14px; font-size: 14px;">지름길 저장 및 여정 완성</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 메모 모달 -->
  <div id="note-modal" class="modal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="note-title">메모</h3>
        <button class="modal-close note-close">✕</button>
      </div>
      <div id="note-form">
        <textarea id="note-input" placeholder="이 팁에 대한 메모나 의견을 입력하세요..."></textarea>
        <div class="note-buttons">
          <button class="btn-delete"></button>
          <button class="btn-save"></button>
        </div>
      </div>
      <div id="note-list" class="note-list"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
